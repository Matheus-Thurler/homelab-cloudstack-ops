apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weave-gitops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Matheus-Thurler/homelab-cloudstack-ops.git
    targetRevision: HEAD
    path: apps/weave-gitops
  destination:
    server: https://kubernetes.default.svc
    namespace: weave-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
