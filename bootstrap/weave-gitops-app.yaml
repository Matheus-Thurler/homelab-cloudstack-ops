apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weave-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/weaveworks/weave-gitops
    path: charts/weave-gitops
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: weave-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
