apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weave-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/weaveworks/charts
    chart: weave-gitops
    targetRevision: 4.0.36
    helm:
      releaseName: weave-gitops
      values: |
        adminUser:
          username: admin
          password: admin123
  destination:
    server: https://kubernetes.default.svc
    namespace: weave-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
