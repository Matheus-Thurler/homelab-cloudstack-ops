apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 2.6.3
    helm:
      values: |
        backstage:
          # Use official Backstage image
          image:
            registry: ghcr.io
            repository: backstage/backstage
            tag: latest
          
          # App Configuration
          appConfig:
            app:
              title: Homelab IDP
              # Usar localhost para deixar Backstage usar a URL atual do navegador
              baseUrl: http://localhost:7007
            
            backend:
              # Backend também usa localhost (o gateway redireciona)
              baseUrl: http://localhost:7007
              listen:
                port: 7007
              cors:
                origin: "*"
                methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
                credentials: true
              auth:
                keys:
                  - secret: "YOUR_SECRET_KEY_CHANGE_THIS"
              database:
                client: pg
                connection:
                  host: backstage-postgresql
                  port: 5432
                  user: backstage
                  password: backstage123
              cache:
                store: memory
            
            catalog:
              import:
                entityFilename: "catalog-info.yaml"
                pullRequestBranchName: "backstage-integration"
              rules:
              - allow: [Component, System, API, Resource, Location, Template]
              locations:
              - type: url
                target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/all-components.yaml
              - type: url
                target: https://raw.githubusercontent.com/Matheus-Thurler/homelab-cloudstack-ops/main/catalog/crossplane-resources.yaml
            
            auth:
              environment: production
              providers:
                guest: null
            
            techdocs:
              builder: local
              generator:
                runIn: local
              publisher:
                type: local

        # PostgreSQL Sub-chart
        postgresql:
          enabled: true
          auth:
            username: backstage
            password: backstage123
            database: backstage
          primary:
            persistence:
              enabled: false
          metrics:
            enabled: false

        # Service configuration
        service:
          type: ClusterIP

        # Ingress (optional)
        ingress:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
