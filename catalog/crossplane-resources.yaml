---
### Sistema: Infraestrutura Crossplane
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: crossplane-cloudstack
  namespace: default
spec:
  owner: platform-team
  domain: infrastructure
  description: Infraestrutura gerenciada via Crossplane e CloudStack

---
### Componente: Provider Crossplane
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: crossplane-provider
  namespace: default
spec:
  type: service
  system: crossplane-cloudstack
  owner: platform-team
  lifecycle: production
  description: |
    Crossplane Provider para gerenciamento de infraestrutura CloudStack.
    Responsável por sincronizar manifests de infra com recursos reais na nuvem.
  
  dependsOn:
    - resource:default/cloudstack-provider
  providesApis:
    - crossplane-infrastructure-api

---
### Componente: Provider CloudStack
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: cloudstack-provider
  namespace: default
spec:
  type: service
  system: crossplane-cloudstack
  owner: platform-team
  lifecycle: production
  description: |
    Provider CloudStack para Crossplane.
    Integração entre Crossplane e API CloudStack.
  consumesApis: []
  providesApis:
    - cloudstack-api

---
### Recurso: VPC de Teste via GitOps
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: gitops-test-vpc
  namespace: default
spec:
  type: vpc
  owner: platform-team
  system: crossplane-cloudstack
  description: |
    **VPC criada via Crossplane e Argo CD**
    
    - Nome: GitOps-Test-VPC
    - CIDR: 10.10.0.0/16
    - Zona: Homelab-Zone
    - Método: IaC (GitOps com Argo CD)
    
    **Status:** Sincronizada via Crossplane
    
    **Namespace:** crossplane-system
    **Recurso:** `vpc/test-gitops-vpc`
  
  dependsOn:
    - resource:default/cloudstack-provider

---
### Recurso: Credenciais CloudStack
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cloudstack-credentials
  namespace: default
spec:
  type: secret
  owner: platform-team
  system: crossplane-cloudstack
  description: |
    Secret de credenciais do CloudStack para Crossplane.
    
    - Nome do Secret: `cloudstack-creds`
    - Namespace: `crossplane-system`
    - Referenciado por: `ProviderConfig/default`
  
  dependsOn: []

---
### API: Crossplane Infrastructure API
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: crossplane-infrastructure-api
  namespace: default
spec:
  type: openapi
  owner: platform-team
  system: crossplane-cloudstack
  description: |
    API para provisionamento de infraestrutura via Crossplane.
    Permite criar e gerenciar recursos CloudStack através de manifests Kubernetes.
  
  lifecycle: production
  definition: |
    openapi: 3.0.0
    info:
      title: Crossplane Infrastructure API
      version: 1.0.0
    paths:
      /vpcs:
        post:
          summary: Criar VPC
          requestBody:
            content:
              application/yaml:
                schema:
                  type: object
                  properties:
                    apiVersion:
                      type: string
                      example: "cloudstack.terasky.com/v1alpha1"
                    kind:
                      type: string
                      example: "VPC"
                    metadata:
                      type: object
                    spec:
                      type: object

---
### API: CloudStack API
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: cloudstack-api
  namespace: default
spec:
  type: openapi
  owner: platform-team
  system: crossplane-cloudstack
  description: API nativa do CloudStack exposta via Crossplane Provider
  lifecycle: production
