apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "port-io.fullname" . }}
  labels:
    app.kubernetes.io/name: port-io
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: port-io
  template:
    metadata:
      labels:
        app.kubernetes.io/name: port-io
    spec:
      containers:
      - name: port-io
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: NODE_ENV
          value: production
        {{- if .Values.port.auth.enabled }}
        - name: AUTH_ENABLED
          value: "true"
        - name: AUTH_PROVIDER
          value: {{ .Values.port.auth.provider }}
        - name: OIDC_ISSUER
          value: {{ .Values.port.auth.oidc.issuer }}
        - name: OIDC_CLIENT_ID
          value: {{ .Values.port.auth.oidc.clientId }}
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: port-io-secret
              key: oidc-client-secret
        {{- end }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: port-io-secret
              key: database-url
        - name: BASE_URL
          value: {{ .Values.port.baseUrl }}
        - name: API_URL
          value: {{ .Values.port.apiUrl }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
