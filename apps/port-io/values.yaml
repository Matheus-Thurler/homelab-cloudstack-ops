replicaCount: 1

image:
  repository: ghcr.io/port-labs/port
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

# Port.io configuration
port:
  clientId: "port-io"
  clientSecret: "port-io-secret-12345"
  
  # Keycloak integration
  auth:
    enabled: true
    provider: oidc
    oidc:
      issuer: https://keycloak.matheus.me/realms/master
      clientId: port-io
      clientSecret: port-io-secret-12345
      authorizationUrl: https://keycloak.matheus.me/realms/master/protocol/openid-connect/auth
      tokenUrl: https://keycloak.matheus.me/realms/master/protocol/openid-connect/token
      userInfoUrl: https://keycloak.matheus.me/realms/master/protocol/openid-connect/userinfo
      scopes:
        - openid
        - profile
        - email
  
  # Database (PostgreSQL)
  database:
    host: port-io-postgresql
    port: 5432
    database: port-io
    username: port-io
    password: port-io123
  
  # Base URL
  baseUrl: https://port.matheus.me
  
  # API
  apiUrl: https://api.port.matheus.me

# PostgreSQL
postgresql:
  enabled: true
  primary:
    persistence:
      enabled: true
      size: 20Gi
