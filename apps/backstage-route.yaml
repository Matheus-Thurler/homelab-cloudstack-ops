---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backstage-route
  namespace: backstage
spec:
  parentRefs:
  - name: homelab-gateway
    namespace: nginx-gateway
  hostnames:
  - "backstage.matheus.me"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
        - name: "X-Forwarded-Proto"
          value: "http"
    backendRefs:
    - name: backstage
      port: 7007
