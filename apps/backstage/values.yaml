## ──────────────────────────────────────────────────────────────────────────────
## Backstage Helm Values — Homelab IDP
## Chart: backstage/backstage v2.6.3
## Docs: https://backstage.github.io/charts
## ──────────────────────────────────────────────────────────────────────────────

backstage:
  image:
    registry: ghcr.io
    repository: backstage/backstage
    tag: latest
    pullPolicy: IfNotPresent

  # ── App Config ──────────────────────────────────────────────────────────────
  appConfig:
    app:
      title: Homelab IDP 🚀
      baseUrl: http://backstage.matheus.me

    backend:
      baseUrl: http://backstage.matheus.me
      listen:
        port: 7007
      cors:
        origin: http://backstage.matheus.me
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: backstage-postgresql
          port: 5432
          user: backstage
          password: backstage123

    integrations: {}

    catalog:
      rules:
      - allow: [Component, System, API, Resource, Location]
      locations:
        # Catálogo de exemplo (componentes da Backstage)
        - type: url
          target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/all-components.yaml
        # Catálogo de recursos gerenciados por Crossplane + CloudStack
        - type: url
          target: https://raw.githubusercontent.com/Matheus-Thurler/homelab-cloudstack-ops/main/catalog/crossplane-resources.yaml

    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local

  # ── Variáveis de Ambiente ────────────────────────────────────────────────────
  extraEnvVars: []

# ── PostgreSQL (Bitnami sub-chart) ─────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: backstage
    password: backstage123  # Mude isso em produção!
    database: backstage
  primary:
    persistence:
      enabled: true
      size: 2Gi

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  ports:
    backend: 7007
